<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Host Dashboard — Quiz Monitor</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:     #0d0d14;
  --panel:  #14141f;
  --border: #1e1e30;
  --accent: #7c3aed;
  --pink:   #e91e8c;
  --green:  #22c55e;
  --amber:  #f59e0b;
  --red:    #ef4444;
  --text:   #e2e0f0;
  --muted:  #6b6890;
  --mono:   'Courier New', monospace;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: system-ui, sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── TOPBAR ── */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 24px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.brand { font-size: 16px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 8px; }
.brand-icon { font-size: 20px; }
.topbar-meta { font-size: 12px; color: var(--muted); font-family: var(--mono); display: flex; align-items: center; gap: 16px; }
.live-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 8px var(--green);
  animation: blink 1.5s ease-in-out infinite;
  flex-shrink: 0;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ── MAIN ── */
.main {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ── GRID PESERTA ── */
.participants-area {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.empty-state {
  flex: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 12px; color: var(--muted);
  font-family: var(--mono); font-size: 13px; text-align: center;
}
.empty-icon { font-size: 48px; opacity: 0.3; }

.grid-title {
  font-size: 11px; font-weight: 600; letter-spacing: 0.1em;
  color: var(--muted); text-transform: uppercase;
  margin-bottom: 4px;
}

/* Grid: setiap baris = 1 peserta card kecil */
.participant-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 12px;
}

/* ── CARD PESERTA ── */
.p-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  transition: border-color 0.2s, transform 0.1s;
}
.p-card:hover { border-color: var(--accent); transform: translateY(-2px); }
.p-card.selected { border-color: var(--pink); }

/* Thumbnail video di dalam card */
.p-card-video {
  width: 100%; height: 120px; background: #000;
  position: relative;
}
.p-card-video video {
  width: 100%; height: 100%; object-fit: cover;
  transform: scaleX(-1); /* mirror front cam */
}
.p-card-video .no-signal {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; color: var(--muted); font-family: var(--mono);
}

/* Status badge di atas video */
.status-badge {
  position: absolute; top: 6px; right: 6px;
  padding: 2px 8px; border-radius: 4px;
  font-size: 10px; font-weight: 600; font-family: var(--mono);
  letter-spacing: 0.05em;
}
.badge-quiz { background: rgba(124,58,237,0.8); color: #d4b8ff; }
.badge-done { background: rgba(34,197,94,0.8);  color: #bbf7d0; }

/* Info di bawah video */
.p-card-info { padding: 10px 12px; }
.p-card-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.p-card-meta { display: flex; gap: 8px; margin-top: 4px; align-items: center; }
.p-card-progress { font-size: 11px; color: var(--muted); font-family: var(--mono); }
.gps-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--amber); flex-shrink: 0;
}
.gps-dot.active { background: var(--green); }
.progress-mini {
  height: 3px; background: var(--border); border-radius: 2px; margin-top: 6px;
}
.progress-mini-fill {
  height: 100%; background: var(--accent); border-radius: 2px;
  transition: width 0.4s ease;
}

/* ── SIDE PANEL (detail peserta) ── */
.side-panel {
  width: 360px;
  flex-shrink: 0;
  background: var(--panel);
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
}
.side-panel.hidden { display: none; }

.side-header {
  padding: 16px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.side-name { font-size: 16px; font-weight: 700; }
.close-btn {
  background: none; border: none; color: var(--muted);
  cursor: pointer; font-size: 18px; padding: 4px;
}
.close-btn:hover { color: var(--text); }

/* Video besar di side panel */
.side-video-wrap {
  width: 100%; aspect-ratio: 16/9;
  background: #000; position: relative;
  flex-shrink: 0;
}
.side-video-wrap video {
  width: 100%; height: 100%; object-fit: cover;
  transform: scaleX(-1);
}
.side-video-wrap .no-signal {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: 12px; color: var(--muted);
}

/* Info section di side panel */
.side-info { padding: 16px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 14px; }

.info-section-title {
  font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
  color: var(--muted); text-transform: uppercase; margin-bottom: 8px;
}

.info-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 0; border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.info-row:last-child { border-bottom: none; }
.info-key   { color: var(--muted); }
.info-val   { font-family: var(--mono); color: var(--text); font-size: 12px; }
.info-val.green { color: var(--green); }
.info-val.amber { color: var(--amber); }

.gps-link {
  color: #a78bfa; text-decoration: none; font-size: 12px;
  font-family: var(--mono);
}
.gps-link:hover { text-decoration: underline; }

/* Jawaban dalam side panel */
.answer-item {
  background: var(--bg); border-radius: 8px;
  padding: 10px 12px; font-size: 13px; line-height: 1.5;
  border: 1px solid var(--border); margin-bottom: 8px;
}
.answer-q { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
.answer-a { color: var(--text); }
.answer-empty { color: var(--muted); font-style: italic; }

/* ── STAT BAR ── */
.stat-bar {
  display: flex; gap: 0;
  border-top: 1px solid var(--border);
  background: var(--panel); flex-shrink: 0;
}
.stat { flex: 1; padding: 8px 16px; border-right: 1px solid var(--border); }
.stat:last-child { border-right: none; }
.stat-label { font-size: 9px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; font-family: var(--mono); }
.stat-val   { font-size: 18px; font-weight: 700; font-family: var(--mono); color: var(--text); }
.stat-val.green { color: var(--green); }

/* ── responsive ── */
@media (max-width: 640px) {
  .side-panel { position: fixed; inset: 0; width: 100%; z-index: 100; }
  .participant-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="brand">
    <span class="brand-icon">📡</span>
    Quiz Monitor — Host Dashboard
  </div>
  <div class="topbar-meta">
    <div class="live-dot"></div>
    <span>LIVE</span>
    <span id="clock">--:--:--</span>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- AREA PESERTA -->
  <div class="participants-area" id="participants-area">
    <!-- kalau kosong tampil ini -->
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">👀</div>
      <div>Belum ada peserta</div>
      <div style="font-size:11px; margin-top:4px">Menunggu peserta bergabung...</div>
    </div>

    <!-- grid muncul otomatis saat ada peserta -->
    <div id="participant-grid-wrap" style="display:none">
      <div class="grid-title">Peserta Aktif</div>
      <div class="participant-grid" id="participant-grid"></div>
    </div>
  </div>

  <!-- SIDE PANEL (detail — muncul saat klik card) -->
  <div class="side-panel hidden" id="side-panel">
    <div class="side-header">
      <div class="side-name" id="side-name">—</div>
      <button class="close-btn" onclick="closePanel()">✕</button>
    </div>

    <!-- Video besar -->
    <div class="side-video-wrap">
      <div class="no-signal" id="side-no-signal">NO SIGNAL</div>
      <video id="side-video" autoplay playsinline></video>
    </div>

    <!-- Info & jawaban -->
    <div class="side-info" id="side-info">
      <!-- diisi dinamis oleh JS -->
    </div>
  </div>

</div>

<!-- STATS BAR -->
<div class="stat-bar">
  <div class="stat">
    <div class="stat-label">Total Peserta</div>
    <div class="stat-val green" id="stat-total">0</div>
  </div>
  <div class="stat">
    <div class="stat-label">Mengerjakan</div>
    <div class="stat-val" id="stat-active">0</div>
  </div>
  <div class="stat">
    <div class="stat-label">Selesai</div>
    <div class="stat-val" id="stat-done">0</div>
  </div>
  <div class="stat">
    <div class="stat-label">Room ID</div>
    <div class="stat-val" id="stat-room" style="font-size:13px">—</div>
  </div>
</div>

<script type="module">
  import { ROOM_ID, QUESTIONS }     from './config.js';
  import { onParticipantsChange }   from './firebase-db.js';
  import { createHostConnection }   from './webrtc.js';

  // ── STATE LOKAL HOST ──────────────────────────────────────
  const connections = {};        // { participantId: { pc, cleanup, videoEl } }
  let allParticipants = {};      // data terakhir dari Firebase
  let selectedId = null;         // ID peserta yang sedang dibuka di side panel

  // ── INIT ─────────────────────────────────────────────────
  document.getElementById('stat-room').textContent = ROOM_ID;
  setInterval(() => {
    document.getElementById('clock').textContent =
      new Date().toLocaleTimeString('id-ID', { hour12: false });
  }, 1000);

  // ── LISTEN PERUBAHAN PESERTA ──────────────────────────────
  // Tiap ada update di Firebase → render ulang semua card
  onParticipantsChange((participants) => {
    allParticipants = participants;
    renderGrid(participants);
    updateStats(participants);

    // Untuk setiap peserta baru → setup WebRTC kalau belum ada
    Object.entries(participants).forEach(([id, data]) => {
      if (!connections[id] && data.profile) {
        setupWebRTCForParticipant(id);
      }
    });

    // Update side panel kalau sedang terbuka
    if (selectedId && participants[selectedId]) {
      updateSidePanel(selectedId, participants[selectedId]);
    }
  });

  // ── SETUP WEBRTC UNTUK SATU PESERTA ──────────────────────
  async function setupWebRTCForParticipant(participantId) {
    // Tandai sudah diproses (meski belum ada offer)
    connections[participantId] = { pc: null, cleanup: null, stream: null };

    const { pc, cleanup } = await createHostConnection(
      participantId,
      (remoteStream) => {
        // Dapat stream dari peserta → simpan dan update semua video elemen
        connections[participantId].stream = remoteStream;
        updateVideoElements(participantId, remoteStream);
      }
    );

    connections[participantId].pc      = pc;
    connections[participantId].cleanup = cleanup;
  }

  // ── PASANG STREAM KE VIDEO ELEMEN ────────────────────────
  function updateVideoElements(participantId, stream) {
    // Update video di card kecil
    const cardVideo = document.getElementById(`vid-${participantId}`);
    if (cardVideo) {
      cardVideo.srcObject = stream;
      cardVideo.play().catch(() => {});
    }

    // Update video di side panel kalau yang ini yang dipilih
    if (selectedId === participantId) {
      const sideVideo = document.getElementById('side-video');
      sideVideo.srcObject = stream;
      sideVideo.play().catch(() => {});
      document.getElementById('side-no-signal').style.display = 'none';
    }
  }

  // ── RENDER GRID ───────────────────────────────────────────
  function renderGrid(participants) {
    const ids = Object.keys(participants);

    if (ids.length === 0) {
      document.getElementById('empty-state').style.display = 'flex';
      document.getElementById('participant-grid-wrap').style.display = 'none';
      return;
    }

    document.getElementById('empty-state').style.display = 'none';
    document.getElementById('participant-grid-wrap').style.display = 'block';

    const grid = document.getElementById('participant-grid');

    ids.forEach(id => {
      const data = participants[id];
      if (!data.profile) return;

      // Cek apakah card sudah ada → kalau ada, update aja
      let card = document.getElementById(`card-${id}`);

      if (!card) {
        // Buat card baru
        card = document.createElement('div');
        card.className = 'p-card';
        card.id = `card-${id}`;
        card.onclick = () => openPanel(id);
        card.innerHTML = `
          <div class="p-card-video">
            <div class="no-signal">NO SIGNAL</div>
            <video id="vid-${id}" autoplay playsinline muted></video>
            <div class="status-badge badge-quiz" id="badge-${id}">QUIZ</div>
          </div>
          <div class="p-card-info">
            <div class="p-card-name" id="name-${id}"></div>
            <div class="p-card-meta">
              <div class="p-card-progress" id="prog-${id}">0/8</div>
              <div class="gps-dot" id="gpsdot-${id}"></div>
            </div>
            <div class="progress-mini">
              <div class="progress-mini-fill" id="progbar-${id}"></div>
            </div>
          </div>
        `;
        grid.appendChild(card);

        // Kalau sudah ada stream (WebRTC sudah konek sebelum card dibuat)
        if (connections[id]?.stream) {
          const v = document.getElementById(`vid-${id}`);
          v.srcObject = connections[id].stream;
          v.play().catch(() => {});
        }
      }

      // Update data di card
      const status   = data.profile?.status || 'waiting';
      const current  = data.progress?.current || 0;
      const total    = QUESTIONS.length;
      const pct      = Math.round((current / total) * 100);
      const hasGps   = !!data.gps;

      document.getElementById(`name-${id}`).textContent  = data.profile.name;
      document.getElementById(`prog-${id}`).textContent  = `${current}/${total}`;
      document.getElementById(`progbar-${id}`).style.width = pct + '%';
      document.getElementById(`gpsdot-${id}`).className  = 'gps-dot' + (hasGps ? ' active' : '');

      const badge = document.getElementById(`badge-${id}`);
      if (status === 'done') {
        badge.textContent = 'DONE';
        badge.className   = 'status-badge badge-done';
      }

      // Tandai card kalau sedang dipilih
      card.className = 'p-card' + (selectedId === id ? ' selected' : '');
    });

    // Hapus card peserta yang sudah tidak ada di Firebase
    Array.from(grid.children).forEach(el => {
      const id = el.id.replace('card-', '');
      if (!participants[id]) el.remove();
    });
  }

  // ── UPDATE STATS BAR ──────────────────────────────────────
  function updateStats(participants) {
    const ids    = Object.keys(participants);
    const active = ids.filter(id => participants[id].profile?.status === 'quiz').length;
    const done   = ids.filter(id => participants[id].profile?.status === 'done').length;

    document.getElementById('stat-total').textContent  = ids.length;
    document.getElementById('stat-active').textContent = active;
    document.getElementById('stat-done').textContent   = done;
  }

  // ── BUKA SIDE PANEL ───────────────────────────────────────
  window.openPanel = (id) => {
    selectedId = id;

    // Update semua card (highlight yang dipilih)
    document.querySelectorAll('.p-card').forEach(c => {
      c.classList.toggle('selected', c.id === `card-${id}`);
    });

    document.getElementById('side-panel').classList.remove('hidden');

    const data = allParticipants[id];
    if (data) updateSidePanel(id, data);

    // Pasang stream ke video besar
    const sideVideo = document.getElementById('side-video');
    if (connections[id]?.stream) {
      sideVideo.srcObject = connections[id].stream;
      sideVideo.play().catch(() => {});
      document.getElementById('side-no-signal').style.display = 'none';
    } else {
      sideVideo.srcObject = null;
      document.getElementById('side-no-signal').style.display = 'flex';
    }
  };

  // ── UPDATE KONTEN SIDE PANEL ──────────────────────────────
  function updateSidePanel(id, data) {
    document.getElementById('side-name').textContent = data.profile?.name || '—';

    const current = data.progress?.current || 0;
    const total   = QUESTIONS.length;
    const answers = data.progress?.answers || {};
    const gps     = data.gps;
    const status  = data.profile?.status || 'waiting';

    const mapsUrl = gps
      ? `https://maps.google.com/?q=${gps.lat},${gps.lng}`
      : null;

    document.getElementById('side-info').innerHTML = `
      <div>
        <div class="info-section-title">Info Peserta</div>
        <div class="info-row"><span class="info-key">Status</span>
          <span class="info-val ${status === 'done' ? 'green' : 'amber'}">
            ${status.toUpperCase()}
          </span>
        </div>
        <div class="info-row"><span class="info-key">Progress</span>
          <span class="info-val">${current} / ${total} soal</span>
        </div>
        <div class="info-row"><span class="info-key">Bergabung</span>
          <span class="info-val">${data.profile?.joinedAt
            ? new Date(data.profile.joinedAt).toLocaleTimeString('id-ID')
            : '—'
          }</span>
        </div>
      </div>

      <div>
        <div class="info-section-title">Lokasi GPS</div>
        ${gps ? `
          <div class="info-row"><span class="info-key">Koordinat</span>
            <a href="${mapsUrl}" target="_blank" class="gps-link">
              ${gps.lat.toFixed(5)}, ${gps.lng.toFixed(5)}
            </a>
          </div>
          <div class="info-row"><span class="info-key">Akurasi</span>
            <span class="info-val">±${gps.acc}m</span>
          </div>
        ` : `
          <div style="color:var(--muted); font-size:13px">GPS belum tersedia</div>
        `}
      </div>

      <div>
        <div class="info-section-title">Jawaban</div>
        ${QUESTIONS.map(q => `
          <div class="answer-item">
            <div class="answer-q">Soal ${q.nomor}: ${q.soal.substring(0, 50)}...</div>
            ${answers[q.id]
              ? `<div class="answer-a">${escapeHtml(answers[q.id])}</div>`
              : `<div class="answer-empty">Belum dijawab</div>`
            }
          </div>
        `).join('')}
      </div>
    `;
  }

  // ── TUTUP SIDE PANEL ──────────────────────────────────────
  window.closePanel = () => {
    selectedId = null;
    document.getElementById('side-panel').classList.add('hidden');
    document.querySelectorAll('.p-card').forEach(c => c.classList.remove('selected'));
  };

  // Helper: escape HTML untuk tampilkan teks user dengan aman
  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }
</script>
</body>
</html>
